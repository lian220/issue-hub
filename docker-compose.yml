services:
  # === Phase 2+ ===
  kafka:
    image: apache/kafka:3.7.0
    container_name: issuehub-kafka
    profiles:
      - phase2
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "issuehub-kafka-cluster-001"
    volumes:
      - ./kafka_data:/tmp/kraft-combined-logs
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: issuehub-kafka-ui
    profiles:
      - phase2
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: issuehub-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  # === Local Development (Aiven/Upstash 없이 로컬 개발 시) ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: issuehub-postgres
    profiles:
      - local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-issuehub}
      POSTGRES_USER: ${POSTGRES_USER:-issuehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issuehub_dev}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-schemas.sh:/docker-entrypoint-initdb.d/init-schemas.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-issuehub} -d ${POSTGRES_DB:-issuehub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: issuehub-redis
    profiles:
      - local
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === 연동 + 인증 ===
  n8n:
    image: n8nio/n8n:1.70.3
    container_name: issuehub-n8n
    profiles:
      - local
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-issuehub}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-issuehub}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-issuehub_dev}
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: issuehub-keycloak
    profiles:
      - local
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-issuehub}
      KC_DB_USERNAME: ${POSTGRES_USER:-issuehub}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-issuehub_dev}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-issuehub_dev}
    volumes:
      - ./deploy/keycloak/issuehub-realm.json:/opt/keycloak/data/import/issuehub-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

